<!-- Spare Parts Request Modal -->
<div class="modal fade" id="sparePartsModal" tabindex="-1" aria-labelledby="sparePartsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header bg-white">
                <h5 class="modal-title" id="sparePartsModalLabel">
                    <i class="fas fa-boxes me-2"></i><span id="formTitle">Create Spare Parts Request</span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <form method="POST" id="sparePartsForm" novalidate>
                {% csrf_token %}
                
                <div class="modal-body">
                    <!-- Basic Information Section -->
                    <h6 class="card-title mb-3">
                        <i class="fas fa-info-circle me-2"></i>Basic Information
                    </h6>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label required">Requested By</label>
                            <input type="text" name="requested_by" id="requestedBy" class="form-control" placeholder="Enter requester name" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label required">Unit Name</label>
                            <input type="text" name="unit_name" id="unitName" class="form-control" placeholder="Enter unit name" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Service Request</label>
                            <select name="service_request" id="serviceRequest" class="form-select">
                                <option value="">No service request</option>
                                {% for request in service_requests %}
                                    <option value="{{ request.id }}">{{ request.request_id }} - {{ request.description|truncatechars:30 }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label required">Created Date & Time</label>
                            <input type="datetime-local" name="created_at" id="createdAt" class="form-control" required>
                        </div>
                    </div>

                    <!-- UAV Details Section -->
                    <h6 class="card-title mb-3 mt-4">
                        <i class="fas fa-drone me-2"></i>UAV Details
                    </h6>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label required">UAV Type</label>
                            <select name="uav_type" id="uavType" class="form-select" required>
                                <option value="">Select UAV type...</option>
                                {% for uav in uav_types %}
                                    <option value="{{ uav.id }}">{{ uav.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label required">Tail Number</label>
                            <input type="text" name="tail_number" id="tailNumber" class="form-control" placeholder="e.g., UAV-001" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label required">Quantity</label>
                            <input type="number" name="quantity" id="quantity" class="form-control" placeholder="Enter quantity" min="1" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-12">
                            <label class="form-label">Remarks (Reason for Request)</label>
                            <textarea name="remarks" id="remarks" class="form-control" rows="3" placeholder="Please provide detailed reason for this spare parts request..."></textarea>
                        </div>
                    </div>

                    <!-- Parts Information Section -->
                    <h6 class="card-title mb-3 mt-4">
                        <i class="fas fa-cogs me-2"></i>Parts Information
                        <button type="button" class="btn btn-sm btn-outline-primary ms-2" onclick="addPartRow()">
                            <i class="fas fa-plus"></i> Add Part
                        </button>
                    </h6>
                    
                    <div class="table-responsive mb-3">
                        <table class="table table-bordered" id="partsTable">
                            <thead class="table-light">
                                <tr>
                                    <th style="width: 35%">Part Name</th>
                                    <th style="width: 35%">Part Number</th>
                                    <th style="width: 20%">Quantity</th>
                                    <th style="width: 10%">Action</th>
                                </tr>
                            </thead>
                            <tbody id="partsBody">
                                <tr class="part-row">
                                    <td>
                                        <input type="text" name="part_names[]" class="form-control" placeholder="Enter part name">
                                    </td>
                                    <td>
                                        <input type="text" name="part_numbers[]" class="form-control" placeholder="Enter part number">
                                    </td>
                                    <td>
                                        <input type="number" name="part_quantities[]" class="form-control" placeholder="Qty" min="1" value="1">
                                    </td>
                                    <td class="text-center">
                                        <button type="button" class="btn btn-sm btn-outline-danger" onclick="removePartRow(this)" disabled>
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Cost Information Section -->
                    <h6 class="card-title mb-3 mt-4">
                        <i class="fas fa-rupee-sign me-2"></i>Cost & Pricing
                    </h6>
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label class="form-label required">OEM Actual Cost</label>
                            <div class="input-group">
                                <span class="input-group-text">₹</span>
                                <input type="number" name="oem_cost" id="oemCost" class="form-control" placeholder="0.00" step="0.01" required>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label required">GST (%)</label>
                            <input type="number" name="gst" id="gst" class="form-control" placeholder="e.g., 18" step="0.1" min="0" max="100" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label required">Cost for Customer</label>
                            <div class="input-group">
                                <span class="input-group-text">₹</span>
                                <input type="number" name="customer_cost" id="customerCost" class="form-control" placeholder="0.00" step="0.01" required>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Profit Margin (%)</label>
                            <input type="number" name="profit_margin" id="profitMargin" class="form-control" placeholder="Auto-calculated" readonly>
                        </div>
                    </div>

                    <!-- Status Information Section -->
                    <h6 class="card-title mb-3 mt-4">
                        <i class="fas fa-check-circle me-2"></i>Status & Availability
                    </h6>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label required">Availability Status</label>
                            <select name="availability_status" id="availabilityStatus" class="form-select" required>
                                <option value="">Select status...</option>
                                <option value="in_stock">In Stock</option>
                                <option value="out_of_stock">Out of Stock</option>
                                <option value="pre_order">Pre-order</option>
                                <option value="backorder">Backorder</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label required">Approval Status</label>
                            <select name="approval_status" id="approvalStatus" class="form-select" required>
                                <option value="">Select status...</option>
                                <option value="pending">Pending</option>
                                <option value="approved">Approved</option>
                                <option value="rejected">Rejected</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Approval Date & Time</label>
                            <input type="datetime-local" name="approval_datetime" id="approvalDatetime" class="form-control">
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label required">Dispatch Status</label>
                            <select name="dispatch_status" id="dispatchStatus" class="form-select" required>
                                <option value="">Select status...</option>
                                <option value="pending">Pending</option>
                                <option value="processing">Processing</option>
                                <option value="shipped">Shipped</option>
                                <option value="delivered">Delivered</option>
                                <option value="completed">Completed</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Dispatch Date & Time</label>
                            <input type="datetime-local" name="dispatch_datetime" id="dispatchDatetime" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Expected Delivery Date</label>
                            <input type="date" name="expected_delivery" id="expectedDelivery" class="form-control">
                        </div>
                    </div>

                    <!-- Hidden field for ID (when editing) -->
                    <input type="hidden" name="request_id" id="requestId">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Create Request</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const sparePartsForm = document.getElementById('sparePartsForm');
    const formTitle = document.getElementById('formTitle');
    const submitBtn = document.getElementById('submitBtn');
    const modalElement = document.getElementById('sparePartsModal');
    const modal = new bootstrap.Modal(modalElement);
    
    // Auto-calculate profit margin
    const oemCost = document.getElementById('oemCost');
    const customerCost = document.getElementById('customerCost');
    const profitMargin = document.getElementById('profitMargin');
    
    function calculateProfitMargin() {
        if (oemCost.value && customerCost.value) {
            const oem = parseFloat(oemCost.value) || 0;
            const customer = parseFloat(customerCost.value) || 0;
            
            if (oem > 0) {
                const margin = ((customer - oem) / oem) * 100;
                profitMargin.value = margin.toFixed(2);
            } else {
                profitMargin.value = '';
            }
        } else {
            profitMargin.value = '';
        }
    }
    
    oemCost.addEventListener('input', calculateProfitMargin);
    customerCost.addEventListener('input', calculateProfitMargin);
    
    // Set default created_at to current datetime
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('createdAt').value = `${year}-${month}-${day}T${hours}:${minutes}`;
    
    // Handle approval status change - enable/disable datetime
    const approvalStatus = document.getElementById('approvalStatus');
    const approvalDatetime = document.getElementById('approvalDatetime');
    
    approvalStatus.addEventListener('change', function() {
        if (this.value === 'approved' || this.value === 'rejected') {
            approvalDatetime.disabled = false;
            if (!approvalDatetime.value) {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                approvalDatetime.value = `${year}-${month}-${day}T${hours}:${minutes}`;
            }
        } else {
            approvalDatetime.disabled = true;
            approvalDatetime.value = '';
        }
    });
    
    // Handle dispatch status change
    const dispatchStatus = document.getElementById('dispatchStatus');
    const dispatchDatetime = document.getElementById('dispatchDatetime');
    
    dispatchStatus.addEventListener('change', function() {
        if (this.value === 'shipped' || this.value === 'delivered' || this.value === 'completed') {
            dispatchDatetime.disabled = false;
            if (!dispatchDatetime.value) {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                dispatchDatetime.value = `${year}-${month}-${day}T${hours}:${minutes}`;
            }
        } else {
            dispatchDatetime.disabled = true;
            dispatchDatetime.value = '';
        }
    });
    
    // Form validation and submission
    sparePartsForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        if (!sparePartsForm.checkValidity()) {
            sparePartsForm.classList.add('was-validated');
            return;
        }
        
        // Validate parts - at least one part with name
        const partNames = document.querySelectorAll('input[name="part_names[]"]');
        let hasValidPart = false;
        partNames.forEach(input => {
            if (input.value.trim() !== '') {
                hasValidPart = true;
            }
        });
        
        if (!hasValidPart) {
            alert('Please add at least one part');
            return;
        }
        
        openPopup("Are you sure you want to save this spare parts request?", function() {
            sparePartsForm.submit();
        });
    });
});

// Function to create new request
function createSparePartsRequest(event) {
    if (event) event.preventDefault();
    
    resetForm();
    document.getElementById('formTitle').textContent = 'Create Spare Parts Request';
    document.getElementById('submitBtn').innerHTML = 'Create Request';
    document.getElementById('sparePartsForm').action = "{% url 'create_spare_parts_request' %}";
    
    // Reset parts table to single row
    const partsBody = document.getElementById('partsBody');
    partsBody.innerHTML = `
        <tr class="part-row">
            <td>
                <input type="text" name="part_names[]" class="form-control" placeholder="Enter part name">
            </td>
            <td>
                <input type="text" name="part_numbers[]" class="form-control" placeholder="Enter part number">
            </td>
            <td>
                <input type="number" name="part_quantities[]" class="form-control" placeholder="Qty" min="1" value="1">
            </td>
            <td class="text-center">
                <button type="button" class="btn btn-sm btn-outline-danger" onclick="removePartRow(this)" disabled>
                    <i class="fas fa-trash"></i>
                </button>
            </td>
        </tr>
    `;
    
    const modal = new bootstrap.Modal(document.getElementById('sparePartsModal'));
    modal.show();
}

// Function to edit existing request
function editSparePartsRequest(id, data) {
    resetForm();
    
    document.getElementById('formTitle').textContent = 'Edit Spare Parts Request';
    document.getElementById('submitBtn').innerHTML = 'Update Request';
    document.getElementById('sparePartsForm').action = `/spare-parts/${id}/edit/`;
    document.getElementById('requestId').value = id;
    
    // Populate basic info
    document.getElementById('requestedBy').value = data.requested_by || '';
    document.getElementById('unitName').value = data.unit_name || '';
    document.getElementById('serviceRequest').value = data.service_request || '';
    document.getElementById('createdAt').value = data.created_at || '';
    
    // Populate UAV details
    document.getElementById('uavType').value = data.uav_type || '';
    document.getElementById('tailNumber').value = data.tail_number || '';
    document.getElementById('quantity').value = data.quantity || '';
    document.getElementById('remarks').value = data.remarks || '';
    
    // Populate parts - clear existing and add from data
    const partsBody = document.getElementById('partsBody');
    partsBody.innerHTML = '';
    
    if (data.parts && data.parts.length > 0) {
        data.parts.forEach((part, index) => {
            addPartRow(part.name, part.number, part.quantity);
        });
    } else {
        // Add one empty row
        addPartRow();
    }
    
    // Populate cost info
    document.getElementById('oemCost').value = data.oem_cost || '';
    document.getElementById('gst').value = data.gst || '';
    document.getElementById('customerCost').value = data.customer_cost || '';
    calculateProfitMargin();
    
    // Populate status
    document.getElementById('availabilityStatus').value = data.availability_status || '';
    document.getElementById('approvalStatus').value = data.approval_status || '';
    document.getElementById('approvalDatetime').value = data.approval_datetime || '';
    document.getElementById('dispatchStatus').value = data.dispatch_status || '';
    document.getElementById('dispatchDatetime').value = data.dispatch_datetime || '';
    document.getElementById('expectedDelivery').value = data.expected_delivery || '';
    
    const modal = new bootstrap.Modal(document.getElementById('sparePartsModal'));
    modal.show();
}

// Function to add part row
function addPartRow(partName = '', partNumber = '', quantity = 1) {
    const partsBody = document.getElementById('partsBody');
    const rowCount = partsBody.children.length;
    
    const newRow = document.createElement('tr');
    newRow.className = 'part-row';
    newRow.innerHTML = `
        <td>
            <input type="text" name="part_names[]" class="form-control" placeholder="Enter part name" value="${partName}">
        </td>
        <td>
            <input type="text" name="part_numbers[]" class="form-control" placeholder="Enter part number" value="${partNumber}">
        </td>
        <td>
            <input type="number" name="part_quantities[]" class="form-control" placeholder="Qty" min="1" value="${quantity}">
        </td>
        <td class="text-center">
            <button type="button" class="btn btn-sm btn-outline-danger" onclick="removePartRow(this)">
                <i class="fas fa-trash"></i>
            </button>
        </td>
    `;
    
    partsBody.appendChild(newRow);
    
    // Enable/disable remove buttons based on row count
    updateRemoveButtons();
}

// Function to remove part row
function removePartRow(button) {
    const row = button.closest('tr');
    const partsBody = document.getElementById('partsBody');
    
    if (partsBody.children.length > 1) {
        row.remove();
        updateRemoveButtons();
    }
}

// Function to update remove buttons state
function updateRemoveButtons() {
    const partsBody = document.getElementById('partsBody');
    const removeButtons = partsBody.querySelectorAll('.btn-outline-danger');
    const rowCount = partsBody.children.length;
    
    removeButtons.forEach((btn, index) => {
        if (rowCount === 1) {
            btn.disabled = true;
        } else {
            btn.disabled = false;
        }
    });
}

// Function to reset form
function resetForm() {
    document.getElementById('sparePartsForm').reset();
    document.getElementById('sparePartsForm').classList.remove('was-validated');
    
    // Reset to current datetime
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('createdAt').value = `${year}-${month}-${day}T${hours}:${minutes}`;
    
    // Clear validation states
    document.querySelectorAll('.form-control, .form-select').forEach(field => {
        field.classList.remove('is-invalid', 'is-valid');
    });
    
    // Reset parts table to single row
    const partsBody = document.getElementById('partsBody');
    partsBody.innerHTML = `
        <tr class="part-row">
            <td>
                <input type="text" name="part_names[]" class="form-control" placeholder="Enter part name">
            </td>
            <td>
                <input type="text" name="part_numbers[]" class="form-control" placeholder="Enter part number">
            </td>
            <td>
                <input type="number" name="part_quantities[]" class="form-control" placeholder="Qty" min="1" value="1">
            </td>
            <td class="text-center">
                <button type="button" class="btn btn-sm btn-outline-danger" onclick="removePartRow(this)" disabled>
                    <i class="fas fa-trash"></i>
                </button>
            </td>
        </tr>
    `;
    
    // Reset status fields
    document.getElementById('approvalDatetime').disabled = true;
    document.getElementById('dispatchDatetime').disabled = true;
}
</script>
